<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect
      const l = window.location;
      const repo = "/Portfolio-Masters-Preethika";
      const newUrl =
        repo + "/?redirect=" + encodeURIComponent(l.pathname + l.search + l.hash);
      l.replace(newUrl);
    </script>
  </head>
  <body></body>
</html>
